# PressPilot Full-Stack CI Pipeline
# Runs on every push and PR to main/develop
# Jobs: backend tests, frontend build, Docker images

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==========================================
  # Backend Tests (Node 18 + 20)
  # ==========================================
  backend-test:
    name: Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    env:
      NODE_ENV: test
      JWT_SECRET: ci_jwt_secret_minimum_32_characters_long_enough_for_tests
      ENCRYPTION_KEY: ci_encryption_key_minimum_32_characters_long_enough
      MONGODB_URI: unused_memory_server_handles_this
      PORT: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: backend
        run: npx jest --coverage --forceExit --detectOpenHandles

      - name: Upload coverage report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ==========================================
  # Frontend Build
  # ==========================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          echo "Build output:"
          ls -lh dist/
          ls -lh dist/assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ==========================================
  # Docker Images Build
  # ==========================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend production image
        working-directory: backend
        run: docker build --target production -t presspilot-backend:${{ github.sha }} .

      - name: Build frontend production image
        run: docker build --target production -t presspilot-frontend:${{ github.sha }} .

      - name: Verify backend image
        run: |
          docker run --rm -d \
            --name presspilot-backend-smoke \
            -e NODE_ENV=production \
            -e MONGODB_URI=mongodb://localhost:27017/test \
            -e JWT_SECRET=ci_jwt_secret_minimum_32_characters_long_enough_for_tests \
            -e ENCRYPTION_KEY=ci_encryption_key_minimum_32_characters_long_enough \
            -e REDIS_URL=redis://localhost:6379 \
            -e FRONTEND_URL=http://localhost:80 \
            -p 3001:3001 \
            presspilot-backend:${{ github.sha }} || true
          sleep 3
          docker logs presspilot-backend-smoke 2>&1 || true
          docker stop presspilot-backend-smoke 2>/dev/null || true

      - name: Verify frontend image
        run: |
          docker run --rm -d \
            --name presspilot-frontend-smoke \
            -p 8080:80 \
            presspilot-frontend:${{ github.sha }}
          sleep 2
          curl -sf http://localhost:8080/health || echo "Health check (expected to work)"
          docker logs presspilot-frontend-smoke 2>&1 || true
          docker stop presspilot-frontend-smoke 2>/dev/null || true

      - name: Show image sizes
        run: |
          echo "Backend image:"
          docker images presspilot-backend:${{ github.sha }} --format "{{.Size}}"
          echo "Frontend image:"
          docker images presspilot-frontend:${{ github.sha }} --format "{{.Size}}"

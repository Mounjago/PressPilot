# PressPilot Backend - CI Pipeline
# Runs on every push and PR to main/develop
# Tests use mongodb-memory-server (no external DB needed)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: test
  JWT_SECRET: ci_jwt_secret_minimum_32_characters_long_enough_for_tests
  ENCRYPTION_KEY: ci_encryption_key_minimum_32_characters_long_enough
  MONGODB_URI: unused_memory_server_handles_this
  PORT: 0

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build --target production -t presspilot-backend:${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run --rm -d \
            --name presspilot-smoke \
            -e NODE_ENV=production \
            -e MONGODB_URI=mongodb://localhost:27017/test \
            -e JWT_SECRET=ci_jwt_secret_minimum_32_characters_long_enough_for_tests \
            -e ENCRYPTION_KEY=ci_encryption_key_minimum_32_characters_long_enough \
            -e REDIS_URL=redis://localhost:6379 \
            -e FRONTEND_URL=http://localhost:3000 \
            -p 3001:3001 \
            presspilot-backend:${{ github.sha }} || true
          sleep 3
          docker logs presspilot-smoke 2>&1 || true
          docker stop presspilot-smoke 2>/dev/null || true

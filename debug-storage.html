<!DOCTYPE html>
<html>
<head>
    <title>Debug LocalStorage PressPilot</title>
</head>
<body>
    <h1>Debug LocalStorage PressPilot</h1>
    <button onclick="debugStorage()">Analyser le localStorage</button>
    <div id="results"></div>

    <script>
        function debugStorage() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Contenu du localStorage:</h2>';

            // Vérifier tous les éléments du localStorage
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.includes('presspilot')) {
                    const value = localStorage.getItem(key);
                    results.innerHTML += `
                        <div style="margin: 10px; padding: 10px; border: 1px solid #ccc;">
                            <h3>${key}</h3>
                            <pre style="background: #f5f5f5; padding: 10px; overflow-x: auto;">${value}</pre>
                        </div>
                    `;
                }
            }
        }

        // Auto-run on load
        window.onload = debugStorage;
    </script>
</body>
</html>

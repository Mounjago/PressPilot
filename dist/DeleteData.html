<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppression des Données Utilisateur</title>
    <link rel="stylesheet" href="styles/delete-data.css">
</head>
<body>
    <div class="delete-data-container">
        <header>
            <img src="https://i.postimg.cc/xTvBjg8H/Bandstream-logo-quadri-noir.png" alt="Logo Bandstream" class="logo">
            <h1>Suppression des Données Utilisateur</h1>
        </header>

        <section class="content">
            <p>
                Si vous souhaitez supprimer toutes vos données personnelles associées à votre compte PressPilot, vous pouvez le faire en cliquant sur le bouton ci-dessous.
            </p>

            <button class="delete-button" onclick="handleDeleteData()">Supprimer mon compte</button>

            <div class="message" id="message"></div>
        </section>

        <footer>
            <p>© 2025 Bandstream. Tous droits réservés.</p>
        </footer>
    </div>

    <script>
        function handleDeleteData() {
            fetch('/api/delete-account', { method: 'DELETE' })
                .then(response => {
                    if (response.ok) {
                        document.getElementById('message').innerText = 'Votre compte a été supprimé avec succès.';
                    } else {
                        document.getElementById('message').innerText = 'Une erreur est survenue lors de la suppression de votre compte.';
                    }
                })
                .catch(error => {
                    console.error('Erreur de suppression:', error);
                    document.getElementById('message').innerText = 'Une erreur est survenue.';
                });
        }
    </script>
</body>
</html>

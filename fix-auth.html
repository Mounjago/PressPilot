<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fix Auth - PressPilot</title>
</head>
<body>
    <h1>Fix Authentication</h1>
    <p>Cette page configure l'authentification pour éviter la boucle de redirection.</p>

    <button onclick="fixAuth()">Corriger l'authentification</button>
    <button onclick="clearAuth()">Effacer l'authentification</button>

    <div id="status"></div>

    <script>
        function fixAuth() {
            // Créer un token et un utilisateur de test
            const token = 'test-token-' + Date.now();
            const user = {
                id: '1',
                email: 'test@presspilot.com',
                name: 'Utilisateur Test',
                role: 'admin'
            };

            // Stocker dans localStorage
            localStorage.setItem('authToken', token);
            localStorage.setItem('user', JSON.stringify(user));
            localStorage.setItem('isAuthenticated', 'true');

            document.getElementById('status').innerHTML = `
                <p style="color: green;">✅ Authentification configurée !</p>
                <p>Token: ${token}</p>
                <p>Utilisateur: ${user.email}</p>
                <p><a href="http://localhost:5173/dashboard">Aller au Dashboard</a></p>
            `;
        }

        function clearAuth() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            localStorage.removeItem('isAuthenticated');

            document.getElementById('status').innerHTML = `
                <p style="color: orange;">🗑️ Authentification effacée</p>
                <p><a href="http://localhost:5173/login">Aller au Login</a></p>
            `;
        }

        // Afficher l'état actuel
        window.onload = function() {
            const token = localStorage.getItem('authToken');
            const user = localStorage.getItem('user');

            if (token && user) {
                document.getElementById('status').innerHTML = `
                    <p style="color: blue;">État actuel:</p>
                    <p>Token: ${token}</p>
                    <p>Utilisateur: ${JSON.parse(user).email}</p>
                `;
            } else {
                document.getElementById('status').innerHTML = `
                    <p style="color: red;">Pas d'authentification détectée</p>
                `;
            }
        }
    </script>
</body>
</html>

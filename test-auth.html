<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Authentification PressPilot</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; background: #f8f9fa; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Authentification PressPilot</h1>

        <h2>Inscription</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="regName">Nom complet:</label>
                <input type="text" id="regName" value="Test User 2" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email:</label>
                <input type="email" id="regEmail" value="test2@presspilot.com" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Mot de passe:</label>
                <input type="password" id="regPassword" value="Test123456!" required>
            </div>
            <div class="form-group">
                <label for="regCompany">Entreprise:</label>
                <input type="text" id="regCompany" value="Test Company">
            </div>
            <button type="submit">S'inscrire</button>
        </form>

        <h2>Connexion</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email:</label>
                <input type="email" id="loginEmail" value="test@presspilot.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Mot de passe:</label>
                <input type="password" id="loginPassword" value="Test123456!" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>

        <h2>Profil (route protégée)</h2>
        <button id="getProfile">Récupérer le profil</button>
        <button id="logout">Se déconnecter</button>

        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3535';
        let authToken = localStorage.getItem('authToken');

        function showResult(message, isSuccess = true) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = `result ${isSuccess ? 'success' : 'error'}`;
            resultDiv.style.display = 'block';
        }

        function updateAuthStatus() {
            const token = localStorage.getItem('authToken');
            if (token) {
                showResult('Token trouvé: ' + token.substring(0, 50) + '...', true);
            }
        }

        // Inscription
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userData = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                company: document.getElementById('regCompany').value
            };

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('authUser', JSON.stringify(data.user));
                    showResult(`Inscription réussie ! Utilisateur: ${data.user.name}`, true);
                    updateAuthStatus();
                } else {
                    showResult(`Erreur d'inscription: ${data.message}`, false);
                }
            } catch (error) {
                showResult(`Erreur: ${error.message}`, false);
            }
        });

        // Connexion
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const credentials = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(credentials)
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('authUser', JSON.stringify(data.user));
                    showResult(`Connexion réussie ! Bienvenue ${data.user.name}`, true);
                    updateAuthStatus();
                } else {
                    showResult(`Erreur de connexion: ${data.message}`, false);
                }
            } catch (error) {
                showResult(`Erreur: ${error.message}`, false);
            }
        });

        // Récupérer le profil
        document.getElementById('getProfile').addEventListener('click', async () => {
            const token = localStorage.getItem('authToken');

            if (!token) {
                showResult('Aucun token trouvé. Veuillez vous connecter.', false);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/auth/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    showResult(`Profil récupéré: ${JSON.stringify(data.user, null, 2)}`, true);
                } else {
                    showResult(`Erreur: ${data.message}`, false);
                }
            } catch (error) {
                showResult(`Erreur: ${error.message}`, false);
            }
        });

        // Déconnexion
        document.getElementById('logout').addEventListener('click', () => {
            localStorage.removeItem('authToken');
            localStorage.removeItem('authUser');
            showResult('Déconnexion réussie !', true);
        });

        // Vérifier le statut au chargement
        updateAuthStatus();
    </script>
</body>
</html>
